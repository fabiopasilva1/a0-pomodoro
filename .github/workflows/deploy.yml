name: Deploy to main/docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Usa a versão do pnpm definida em package.json (packageManager)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Pages mode)
        run: pnpm run build:pages

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html
      
        
      # - name: Deploy to main/docs
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     branch: main
      #     folder: dist
      #     target-folder: docs
      #     clean: true
      #     single-commit: true
      #     commit-message: 'chore(pages): deploy dist to docs [skip ci]'

      - name: Set Server IP and Commands
        run: |
          echo "SERVER_IP=${{ secrets.SERVER_IP }}" >> $GITHUB_ENV
          echo "DEPLOY_COMMAND=cd /home/fabio/projetos/a0/ && git pull origin staging && docker compose up --build -d" >> $GITHUB_ENV  
      - name: Deplou to Server
        run: |
          ssh -o StrictHostKeyChecking=no root@145.223.95.9 << EOF
            $DEPLOY_COMMAND
          EOF
  
     
