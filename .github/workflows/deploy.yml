name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Se desejar, adicione etapas de lint e teste (opcional):
      # - name: Lint
      #   run: pnpm run lint
      # - name: Test
      #   run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages   # branch para publicar o site, NÃO use 'main'
          folder: docs       # ajuste se o build sair em outro diretório (ex: 'dist', 'build', etc)
